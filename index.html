<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>


<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#02025f;
}

.container{
    width:330px;
    background:#f2f2f2;
    padding:30px 25px;
    border-radius:15px;
}

.container h2{
    text-align:center;
    color:#ff7300;
    margin-bottom:25px;
}

.input-box{
    position:relative;
    margin-bottom:15px;
}

.input-box i{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#666;
}

.input-box .right-icon{
    left:auto;
    right:12px;
}

.input-box input{
    width:100%;
    height:45px;
    padding:0 40px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:15px;
    background:#fff;
}

.btn{
    width:100%;
    height:45px;
    border:none;
    border-radius:8px;
    background:#ff7300;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:5px;
}

.btn:hover{
    background:#e66600;
}
</style>
</head>

<body>

<div class="container">
    <h2>Registration Form</h2>

    <div class="input-box">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Username" required>
    </div>

    <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="Email" required>
    </div>

    <div class="input-box">
        <i class="fa-solid fa-mobile-screen"></i>
        <input type="tel" placeholder="Phone Number" required>
    </div>

    <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Password" required>
        <i class="fa-solid fa-eye right-icon"></i>
    </div>

    <div class="input-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search">
    </div>
    
    <button class="btn"> <a href="home.html">submit</a></button>
    
</div>

</body>
</html>
