<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#02025f;
}

.login-box{
    width:330px;
    background:#f5f5f5;
    padding:30px;
    border-radius:15px;
}

.login-box h2{
    text-align:center;
    color:#ff7300;
    margin-bottom:25px;
}

.input-box{
    position:relative;
    margin-bottom:15px;
}

.input-box i{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#777;
}

.input-box input{
    width:100%;
    height:45px;
    padding-left:40px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

.password-box .eye{
    left:auto;
    right:12px;
    cursor:pointer;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    font-size:14px;
}

.options a{
    text-decoration:none;
    color:#ff7300;
}

button{
    width:100%;
    height:45px;
    border:none;
    border-radius:8px;
    background:#ff7300;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e66600;
}

.signup{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.signup a{
    color:#ff7300;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Login Form</h2>

    <div class="input-box">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Username">
    </div>

    <div class="input-box password-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Password" id="password">
        <i class="fa-solid fa-eye eye" onclick="togglePassword()"></i>
    </div>

    <div class="options">
        <label>
            <input type="checkbox"> Remember Me
        </label>
        <a href="#">Forgot Password?</a>
    </div>

    <button><a href="home.html">login</a></button>

    <div class="signup">
        Don't have an account?
        <a href="#">Register</a>
    </div>
</div>

<script>
function togglePassword() {
    const password = document.getElementById("password");
    
    if(password.type === "password"){
        password.type = "text";
    } else {
        password.type = "password";
    }
}
</script>

</body>
</html>
